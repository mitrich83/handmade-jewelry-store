name: Auto Create PR

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"

          # Check if PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH, skipping."
            exit 0
          fi

          # Extract issue number from branch name (e.g. feature/issue-2-repo-structure → #2)
          ISSUE=$(echo "$BRANCH" | grep -oP '(?<=issue-)\d+' || echo "")
          CLOSES=""
          if [ -n "$ISSUE" ]; then
            CLOSES="Closes #$ISSUE"
          fi

          # Build PR title from branch name
          TITLE=$(echo "$BRANCH" | sed 's|.*/||' | sed 's/-/ /g' | sed 's/issue [0-9]* //')
          TYPE=$(echo "$BRANCH" | cut -d'/' -f1)
          PR_TITLE="$TYPE: $TITLE"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$PR_TITLE" \
            --body "$(cat <<EOF
          ## Why

          $CLOSES

          ## What changed

          -

          ## How to test

          1.

          ## Checklist

          - [ ] No \`any\` types in TypeScript
          - [ ] \`pnpm lint\` passes
          - [ ] \`pnpm build\` passes locally
          - [ ] Self-reviewed the diff before opening PR
          EOF
          )" \
            --draft
