name: Auto Create PR

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'docs/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"

          # Check if PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH — skipping."
            exit 0
          fi

          # Extract issue number from branch name (feature/issue-2-foo → 2)
          ISSUE=$(echo "$BRANCH" | grep -oE 'issue-[0-9]+' | grep -oE '[0-9]+' || true)
          CLOSES=""
          [ -n "$ISSUE" ] && CLOSES="Closes #$ISSUE"

          # Build PR title: "chore: ci checks" from "chore/issue-9-ci-checks"
          TYPE=$(echo "$BRANCH" | cut -d'/' -f1)
          SLUG=$(echo "$BRANCH" | sed 's|.*/||' | sed 's/issue-[0-9]*-//' | tr '-' ' ')
          PR_TITLE="$TYPE: $SLUG"

          PR_BODY="## Why

$CLOSES

## What changed

-

## How to test

1.

## Checklist

- [ ] No \`any\` types in TypeScript
- [ ] \`pnpm lint\` passes
- [ ] \`pnpm build\` passes locally
- [ ] Self-reviewed the diff before opening PR"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --draft

          echo "Draft PR created for branch $BRANCH"
